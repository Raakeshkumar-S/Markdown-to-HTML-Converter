<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Markdown to HTML Converter</title>
    <link rel="stylesheet" href="styles.css">
</head>

<body>
    <h1 id="title">Markdown to HTML Converter</h1>
    <div id="container">
        <div class="container">
            <h2 class="sub-title">Markdown Input:</h2>
            <textarea class="textholder" id="markdown-input" placeholder="Enter your markdown here..."></textarea>
        </div>
        <div class="container">
            <h2 class="sub-title">Raw HTML Output:</h2>
            <div class="textholder" id="html-output"></div>
        </div>
        <div class="container">
            <h2 class="sub-title">HTML Preview</h2>
            <div class="textholder" id="preview"></div>
        </div>
    </div>
</body>
<script src="script.js"></script>

</html>
